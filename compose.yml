services:
  registration-database:
    image: mysql:9.6
    environment:
      MYSQL_DATABASE: registration
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3307:3306"
    volumes:
      - registration_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-papp"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-database:
    image: mysql:9.6
    environment:
      MYSQL_DATABASE: catalog
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3308:3306"
    volumes:
      - catalog_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-papp"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-metadata-database:
    image: mongo:8.2
    ports:
      - "27018:27017"
    volumes:
      - metadata_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet 127.0.0.1:27017/test --eval 'db.runCommand({ping:1}).ok' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  
  catalog-cache:
    image: redis:8.6
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ticketing-database:
    image: postgres:17-alpine
    container_name: marketplace-ticketing-database-1
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    volumes:
      - ticketing_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ticketing"]
      interval: 10s
      timeout: 5s
      retries: 5

  ticketing-locking:
    image: redis:8.6
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  registration_data:
  catalog_data:
  metadata_data:
  ticketing_data: